name: Build LandVe Cip129 (RKSU)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel by Youffx
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: Youffx/4.19-rosemary-kernel
          fetch-depth: 1

      - name: Download and Apply CIP
        run: |
          wget -q https://git.kernel.org/pub/scm/linux/kernel/git/cip/linux-cip.git/snapshot/linux-cip-4.19.325-cip129.tar.gz
          tar -xzf linux-cip-4.19.325-cip129.tar.gz
          rsync -a linux-cip-4.19.325-cip129/ ./
          rm -rf linux-cip-4.19.325-cip129*

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf libelf-dev liblz4-tool libncurses5-dev libssl-dev lzop rsync zip zlib1g-dev

      - name: Setup Clang ZyCromerZ
        run: |
          mkdir -p ${{ github.workspace }}/clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20260208-release/Clang-15.0.7-20260208.tar.gz
          tar -xf Clang-15.0.7-20260208.tar.gz -C ${{ github.workspace }}/clang
          rm Clang-15.0.7-20260208.tar.gz
          ${{ github.workspace }}/clang/bin/clang --version

      - name: Setup RKSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" | bash -s main
          mkdir -p drivers/input/touchscreen/mediatek/ft3418_i2c/include/firmware/
          touch drivers/input/touchscreen/mediatek/ft3418_i2c/include/firmware/fw_sample.i

      - name: Apply RKSU Manual Hook Patch
        run: |
          curl -LSs "https://raw.githubusercontent.com/rksuorg/kernel_patches/master/manual_hook/kernel-4.19_5.4.patch" | patch -p1

      - name: Fix Macro Redefinitions and KernelSU Patch
        run: |
          # 1. Fix Limits / Macros
          for path in include/linux/kernel.h include/linux/limits.h include/vdso/limits.h include/uapi/linux/limits.h include/uapi/linux/xattr.h; do
            if [ -f "$path" ]; then
              sed -i 's/#define USHRT_MAX/#ifndef USHRT_MAX\n#define USHRT_MAX/g' "$path"
              sed -i 's/#define NAME_MAX/#ifndef NAME_MAX\n#define NAME_MAX/g' "$path"
              sed -i 's/#define PATH_MAX/#ifndef PATH_MAX\n#define PATH_MAX/g' "$path"
              sed -i 's/#define ARG_MAX/#ifndef ARG_MAX\n#define ARG_MAX/g' "$path"
              sed -i 's/#define NGROUPS_MAX/#ifndef NGROUPS_MAX\n#define NGROUPS_MAX/g' "$path"
              sed -i 's/#define XATTR_NAME_MAX/#ifndef XATTR_NAME_MAX\n#define XATTR_NAME_MAX/g' "$path"
              sed -i 's/#define XATTR_SIZE_MAX/#ifndef XATTR_SIZE_MAX\n#define XATTR_SIZE_MAX/g' "$path"
              sed -i 's/#define XATTR_LIST_MAX/#ifndef XATTR_LIST_MAX\n#define XATTR_LIST_MAX/g' "$path"
            fi
          done

          echo -e "\n#ifndef NAME_MAX\n#define NAME_MAX 255\n#endif\n#ifndef PATH_MAX\n#define PATH_MAX 4096\n#endif\n#ifndef ARG_MAX\n#define ARG_MAX 131072\n#endif\n#ifndef NGROUPS_MAX\n#define NGROUPS_MAX 65536\n#endif\n#ifndef XATTR_NAME_MAX\n#define XATTR_NAME_MAX 255\n#endif\n#ifndef XATTR_SIZE_MAX\n#define XATTR_SIZE_MAX 65536\n#endif\n#ifndef XATTR_LIST_MAX\n#define XATTR_LIST_MAX 65536\n#endif\n" >> include/linux/kernel.h

          # 2. Fix KernelSU Makefile Includes
          sed -i '1i ccflags-y += -I$(srctree)/security/selinux/include\nccflags-y += -I$(objtree)/security/selinux/include' drivers/kernelsu/Makefile
          echo -e "\nccflags-y += -I$(srctree)/security/selinux\nccflags-y += -I$(srctree)/security/selinux/include\nccflags-y += -I$(objtree)/security/selinux\nccflags-y += -I$(objtree)/security/selinux/include" >> drivers/kernelsu/Makefile

          # 3. Fix KernelSU App Profile Seccomp
          if [ -f "drivers/kernelsu/app_profile.c" ]; then
            sed -i 's/current->seccomp.mode\s*=\s*0;//g' drivers/kernelsu/app_profile.c
            sed -i 's/current->seccomp.filter\s*=\s*NULL;//g' drivers/kernelsu/app_profile.c
            sed -i 's/if\s*(!!!current->seccomp.mode)/if (0)/g' drivers/kernelsu/app_profile.c
          fi

          # 4. Export Required Symbols (Replace Python with Bash for reliability)
          export_symbol() {
            local file=$1
            local sym=$2
            if [ -f "$file" ]; then
              # Remove static modifier
              sed -i "s/static void $sym/void $sym/g" "$file"
              sed -i "s/static int $sym/int $sym/g" "$file"
              sed -i "s/static struct avtab_node \*$sym/struct avtab_node \*$sym/g" "$file"
              sed -i "s/static void \*$sym/void \*$sym/g" "$file"
              # Append EXPORT_SYMBOL_GPL
              if ! grep -q "EXPORT_SYMBOL_GPL($sym);" "$file"; then
                echo -e "\nEXPORT_SYMBOL_GPL($sym);" >> "$file"
              fi
            fi
          }

          export_symbol "fs/ext4/sysfs.c" "ext4_unregister_sysfs"
          export_symbol "security/selinux/ss/hashtab.c" "hashtab_search"
          export_symbol "security/selinux/ss/hashtab.c" "hashtab_insert"
          export_symbol "security/selinux/ss/ebitmap.c" "ebitmap_set_bit"
          export_symbol "security/selinux/ss/ebitmap.c" "ebitmap_get_bit"
          export_symbol "security/selinux/ss/avtab.c" "avtab_search_node"
          export_symbol "security/selinux/ss/avtab.c" "avtab_search_node_next"
          export_symbol "security/selinux/ss/avtab.c" "avtab_insert_nonunique"
          export_symbol "security/selinux/avc.c" "avc_ss_reset"
          export_symbol "security/selinux/netlink.c" "selnl_notify_policyload"
          export_symbol "security/selinux/status.c" "selinux_status_update_policyload"

          # Handle selinux_state directly
          if [ -f "security/selinux/hooks.c" ] && ! grep -q "EXPORT_SYMBOL_GPL(selinux_state);" "security/selinux/hooks.c"; then
            echo -e "\nEXPORT_SYMBOL_GPL(selinux_state);" >> security/selinux/hooks.c
          fi
          if [ -f "security/selinux/ss/services.c" ] && ! grep -q "EXPORT_SYMBOL_GPL(selinux_state);" "security/selinux/ss/services.c"; then
            echo -e "\nEXPORT_SYMBOL_GPL(selinux_state);" >> security/selinux/ss/services.c
          fi

      - name: Inject SELinux Headers
        run: |
          mkdir -p security/selinux/include
          curl -LSs "https://raw.githubusercontent.com/Youffx/4.19-rosemary-kernel/main/.github/SELinuxFix/flask.h" -o security/selinux/flask.h
          curl -LSs "https://raw.githubusercontent.com/Youffx/4.19-rosemary-kernel/main/.github/SELinuxFix/av_permissions.h" -o security/selinux/av_permissions.h
          cp security/selinux/flask.h security/selinux/include/flask.h
          cp security/selinux/av_permissions.h security/selinux/include/av_permissions.h

      - name: Modifikasi Defconfig
        run: |
          DEFCONFIG="arch/arm64/configs/rosemary_defconfig"
          
          sed -i '/CONFIG_KSU/d' $DEFCONFIG
          sed -i '/CONFIG_KPROBES/d' $DEFCONFIG
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          sed -i '/CONFIG_EROFS_FS/d' $DEFCONFIG
          sed -i '/CONFIG_SDCARD_FS/d' $DEFCONFIG
          sed -i '/CONFIG_SECURITY/d' $DEFCONFIG
          
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_MANUAL_HOOK=y"
            echo "CONFIG_EROFS_FS=y"
            echo "CONFIG_EROFS_FS_ZIP=y"
            echo "CONFIG_EROFS_FS_POSIX_ACL=y"
            echo "CONFIG_EROFS_FS_SECURITY=y"
            echo "CONFIG_SDCARD_FS=y"
            echo "CONFIG_SECURITY=y"
            echo "CONFIG_SECURITY_NETWORK=y"
            echo "CONFIG_SECURITY_SELINUX=y"
            echo 'CONFIG_LOCALVERSION="-LandVe🍋‍🟩/Lime"'
            echo "CONFIG_LOCALVERSION_AUTO=n"
          } >> $DEFCONFIG
          
          echo "# CONFIG_KPROBES is not set" >> $DEFCONFIG

      - name: Build Kernel
        run: |
          export PATH="${{ github.workspace }}/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="Youffx"
          export KBUILD_BUILD_HOST="Builder"
          export KBUILD_LSB_VERSION=n
          MAKE_FLAGS=(
              ARCH=arm64
              CROSS_COMPILE=aarch64-linux-gnu-
              CROSS_COMPILE_ARM32=arm-linux-gnueabi-
              CC=clang
              LD=ld.lld
              AR=llvm-ar
              NM=llvm-nm
              OBJCOPY=llvm-objcopy
              OBJDUMP=llvm-objdump
              STRIP=llvm-strip
              CLANG_TRIPLE=aarch64-linux-gnu-
              KBUILD_BUILD_VERSION=1
          )
          
          make O=out "${MAKE_FLAGS[@]}" rosemary_defconfig
          make -j$(nproc --all) O=out "${MAKE_FLAGS[@]}"

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: LandVe-Image-RKSU
          path: out/arch/arm64/boot/Image.gz-dtb
          
