name: Build LandVe Cip129 (RKSU)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel by Youffx
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: Youffx/4.19-rosemary-kernel
          fetch-depth: 1

      - name: Download and Apply CIP
        run: |
          wget -q https://git.kernel.org/pub/scm/linux/kernel/git/cip/linux-cip.git/snapshot/linux-cip-4.19.325-cip129.tar.gz
          tar -xzf linux-cip-4.19.325-cip129.tar.gz
          rsync -a --exclude='security/selinux/' linux-cip-4.19.325-cip129/ ./
          rm -rf linux-cip-4.19.325-cip129*

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf libelf-dev liblz4-tool libncurses5-dev libssl-dev lzop rsync zip zlib1g-dev

      - name: Setup Clang ZyCromerZ
        run: |
          mkdir -p ${{ github.workspace }}/clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20260208-release/Clang-15.0.7-20260208.tar.gz
          tar -xf Clang-15.0.7-20260208.tar.gz -C ${{ github.workspace }}/clang
          rm Clang-15.0.7-20260208.tar.gz
          ${{ github.workspace }}/clang/bin/clang --version

      - name: Setup RKSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" | bash -s main
          mkdir -p drivers/input/touchscreen/mediatek/ft3418_i2c/include/firmware/
          touch drivers/input/touchscreen/mediatek/ft3418_i2c/include/firmware/fw_sample.i

      - name: Apply RKSU Manual Hook Patch
        run: |
          curl -LSs "https://raw.githubusercontent.com/rksuorg/kernel_patches/master/manual_hook/kernel-4.19_5.4.patch" | patch -p1

      - name: Fix Macro Redefinitions and KernelSU Patch
        run: |
          python3 - <<'EOF'
          import os, re
          
          headers = [
              'include/linux/kernel.h',
              'include/linux/limits.h',
              'include/vdso/limits.h',
              'include/uapi/linux/limits.h',
              'include/uapi/linux/xattr.h'
          ]
          
          macros = [
              'USHRT_MAX', 'SHRT_MAX', 'SHRT_MIN', 'INT_MAX', 'INT_MIN',
              'UINT_MAX', 'LONG_MAX', 'LONG_MIN', 'ULONG_MAX',
              'LLONG_MAX', 'LLONG_MIN', 'ULLONG_MAX',
              'S8_MAX', 'S8_MIN', 'U8_MAX', 'S16_MAX', 'S16_MIN',
              'U16_MAX', 'S32_MAX', 'S32_MIN', 'U32_MAX',
              'S64_MAX', 'S64_MIN', 'U64_MAX',
              'NAME_MAX', 'PATH_MAX', 'NGROUPS_MAX', 'ARG_MAX',
              'XATTR_NAME_MAX', 'XATTR_SIZE_MAX', 'XATTR_LIST_MAX'
          ]
          
          for path in headers:
              if os.path.exists(path):
                  with open(path, 'r') as f:
                      lines = f.readlines()
                  new_lines = []
                  for line in lines:
                      match = None
                      for m in macros:
                          if re.match(r'^[ \t]*#[ \t]*define[ \t]+' + m + r'\b', line):
                              match = m
                              break
                      if match:
                          new_lines.append(f"#ifndef {match}\n")
                          new_lines.append(line)
                          new_lines.append("#endif\n")
                      else:
                          new_lines.append(line)
                  with open(path, 'w') as f:
                      f.writelines(new_lines)
          kernel_h = 'include/linux/kernel.h'
          if os.path.exists(kernel_h):
              with open(kernel_h, 'a') as f:
                  f.write("\n#ifndef NAME_MAX\n#define NAME_MAX 255\n#endif\n")
                  f.write("#ifndef PATH_MAX\n#define PATH_MAX 4096\n#endif\n")
                  f.write("#ifndef ARG_MAX\n#define ARG_MAX 131072\n#endif\n")
                  f.write("#ifndef NGROUPS_MAX\n#define NGROUPS_MAX 65536\n#endif\n")
                  f.write("#ifndef XATTR_NAME_MAX\n#define XATTR_NAME_MAX 255\n#endif\n")
                  f.write("#ifndef XATTR_SIZE_MAX\n#define XATTR_SIZE_MAX 65536\n#endif\n")
                  f.write("#ifndef XATTR_LIST_MAX\n#define XATTR_LIST_MAX 65536\n#endif\n")
          ksu_app = 'drivers/kernelsu/app_profile.c'
          if os.path.exists(ksu_app):
              with open(ksu_app, 'r') as f:
                  content = f.read()
              content = re.sub(r'current->seccomp\.mode\s*=\s*0;', '', content)
              content = re.sub(r'current->seccomp\.filter\s*=\s*NULL;', '', content)
              content = re.sub(r'if\s*\(\!\!\!current->seccomp\.mode\)', 'if (0)', content)
              with open(ksu_app, 'w') as f:
                  f.write(content)
          ksu_fw = 'drivers/kernelsu/file_wrapper.c'
          if os.path.exists(ksu_fw):
              with open(ksu_fw, 'r') as f:
                  fw_content = f.read()
              fw_content = re.sub(r'#include\s+["<].*objsec\.h[">]', '', fw_content)
              fw_content = fw_content.replace('wrapper_inode->i_security', 'NULL')
              fw_content = fw_content.replace('wrapper_sec->sid = ksu_file_sid;', '/* bypass sid */')
              with open(ksu_fw, 'w') as f:
                  f.write(fw_content)
          ksu_selinux_defs = 'drivers/kernelsu/selinux/selinux_defs.h'
          if os.path.exists(ksu_selinux_defs):
              with open(ksu_selinux_defs, 'r') as f:
                  sd_content = f.read()
              sd_content = re.sub(r'#include\s+["<].*objsec\.h[">]', '', sd_content)
              sd_content = sd_content.replace('return (taskcred_sec_t *)cred->security;', 'return NULL;')
              with open(ksu_selinux_defs, 'w') as f:
                  f.write(sd_content)
          ksu_selinux = 'drivers/kernelsu/selinux/selinux.c'
          if os.path.exists(ksu_selinux):
              with open(ksu_selinux, 'r') as f:
                  s_content = f.read()
              s_struct = '#include <linux/types.h>\nstruct task_security_struct { unsigned int osid; unsigned int sid; unsigned int exec_sid; unsigned int create_sid; unsigned int keycreate_sid; unsigned int sockcreate_sid; };\n'
              s_content = s_struct + s_content.replace('return tsec->sid == cached_sid;', 'return 1;')
              with open(ksu_selinux, 'w') as f:
                  f.write(s_content)
          ksu_sepolicy = 'drivers/kernelsu/selinux/sepolicy.c'
          if os.path.exists(ksu_sepolicy):
              with open(ksu_sepolicy, 'r') as f:
                  p_content = f.read()
              p_macro = '\n#ifndef CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS\n#define CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS 9\n#endif\n'
              p_content = p_macro + p_content
              with open(ksu_sepolicy, 'w') as f:
                  f.write(p_content)
          ksu_sepolicy_h = 'drivers/kernelsu/selinux/sepolicy.h'
          if os.path.exists(ksu_sepolicy_h):
              with open(ksu_sepolicy_h, 'r') as f:
                  ph_content = f.read()
              ph_macro = '#ifndef CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS\n#define CONFIG_SECURITY_SELINUX_SIDTAB_HASH_BITS 9\n#endif\n'
              if 'SIDTAB_HASH_BITS 9' not in ph_content:
                  ph_content = ph_macro + ph_content
              with open(ksu_sepolicy_h, 'w') as f:
                  f.write(ph_content)

          ksu_ksud = 'drivers/kernelsu/ksud.c'
          if os.path.exists(ksu_ksud):
              with open(ksu_ksud, 'r') as f:
                  k_content = f.read()
              k_content = 'struct super_block;\nvoid ksu_dummy_ext4(struct super_block *sb) {}\n' + k_content.replace('ext4_unregister_sysfs', 'ksu_dummy_ext4')
              with open(ksu_ksud, 'w') as f:
                  f.write(k_content)

          ksu_lsm = 'drivers/kernelsu/lsm_hook.c'
          if os.path.exists(ksu_lsm):
              with open(ksu_lsm, 'w') as f:
                  f.write('void *ksu_hooks[1] = {0};\n')

          ksu_shim = 'drivers/kernelsu/shim.c'
          if os.path.exists(ksu_shim):
              with open(ksu_shim, 'r') as f:
                  s_content = f.read()
              dummies = (
                  'void ksu_lsm_hook_init(void) {}\n'
                  'void ksu_dummy_hooks(void *a, int b, void *c) {}\n'
                  'int security_hook_heads = 0;\n'
              )
              s_content = dummies + s_content.replace('security_add_hooks', 'ksu_dummy_hooks')
              with open(ksu_shim, 'w') as f:
                  f.write(s_content)

          ksu_rules = 'drivers/kernelsu/selinux/rules.c'
          if os.path.exists(ksu_rules):
              with open(ksu_rules, 'w') as f:
                  f.write('#include <linux/types.h>\n')
                  f.write('void apply_kernelsu_rules(void) {}\n')
                  f.write('int handle_sepolicy(unsigned int cmd, unsigned long a2, unsigned long a3, unsigned long a4, unsigned long a5) { return 0; }\n')
                  f.write('void ksu_setenforce(int enforce) {}\n')

          ksu_sepolicy = 'drivers/kernelsu/selinux/sepolicy.c'
          if os.path.exists(ksu_sepolicy):
              with open(ksu_sepolicy, 'w') as f:
                  f.write('#include <linux/types.h>\n#include "sepolicy.h"\nvoid ksu_load_policy(void) { return; }\n')
          EOF

      - name: Inject SELinux Headers
        run: |
          mkdir -p security/selinux/include
          curl -LSs "https://raw.githubusercontent.com/Youffx/4.19-rosemary-kernel/main/.github/SELinuxFix/flask.h" -o security/selinux/flask.h
          curl -LSs "https://raw.githubusercontent.com/Youffx/4.19-rosemary-kernel/main/.github/SELinuxFix/av_permissions.h" -o security/selinux/av_permissions.h
          cp security/selinux/flask.h security/selinux/include/flask.h
          cp security/selinux/av_permissions.h security/selinux/include/av_permissions.h
 
      - name: Modifikasi Defconfig
        run: |
          DEFCONFIG="arch/arm64/configs/rosemary_defconfig"
          
          sed -i '/CONFIG_KSU/d' $DEFCONFIG
          sed -i '/CONFIG_KPROBES/d' $DEFCONFIG
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          sed -i '/CONFIG_EROFS_FS/d' $DEFCONFIG
          sed -i '/CONFIG_SDCARD_FS/d' $DEFCONFIG
          
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_MANUAL_HOOK=y"
            echo "# CONFIG_KPROBES is not set"
            echo "CONFIG_EROFS_FS=y"
            echo "CONFIG_EROFS_FS_ZIP=y"
            echo "CONFIG_EROFS_FS_POSIX_ACL=y"
            echo "CONFIG_EROFS_FS_SECURITY=y"
            echo "CONFIG_SDCARD_FS=y"
            echo 'CONFIG_LOCALVERSION="-LandVe🍋‍🟩/Lime"'
            echo "CONFIG_LOCALVERSION_AUTO=n"
          } >> $DEFCONFIG
          
          echo "# CONFIG_KPROBES is not set" >> $DEFCONFIG

      - name: Clean Build Directory
        run: |
          make O=out mrproper
          make O=out distclean

      - name: Build Kernel
        run: |
          export PATH="${{ github.workspace }}/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="Youffx"
          export KBUILD_BUILD_HOST="Builder"
          export KBUILD_LSB_VERSION=n
          MAKE_FLAGS=(
              ARCH=arm64
              CROSS_COMPILE=aarch64-linux-gnu-
              CROSS_COMPILE_ARM32=arm-linux-gnueabi-
              CC=clang
              LD=ld.lld
              AR=llvm-ar
              NM=llvm-nm
              OBJCOPY=llvm-objcopy
              OBJDUMP=llvm-objdump
              STRIP=llvm-strip
              CLANG_TRIPLE=aarch64-linux-gnu-
              KBUILD_BUILD_VERSION=1
          )
          
          make O=out "${MAKE_FLAGS[@]}" rosemary_defconfig
          make -j$(nproc --all) O=out "${MAKE_FLAGS[@]}"

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: LandVe-Image-RKSU
          path: out/arch/arm64/boot/Image.gz-dtb
