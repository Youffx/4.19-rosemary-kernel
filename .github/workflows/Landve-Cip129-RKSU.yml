name: Build LandVe Cip129 (RKSU)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel by Youffx
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: Youffx/4.19-rosemary-kernel
          fetch-depth: 1

      - name: Download and Apply CIP
        run: |
          wget -q https://git.kernel.org/pub/scm/linux/kernel/git/cip/linux-cip.git/snapshot/linux-cip-4.19.325-cip129.tar.gz
          tar -xzf linux-cip-4.19.325-cip129.tar.gz
          rsync -a linux-cip-4.19.325-cip129/ ./
          rm -rf linux-cip-4.19.325-cip129*

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf libelf-dev liblz4-tool libncurses5-dev libssl-dev lzop rsync zip zlib1g-dev

      - name: Setup Clang ZyCromerZ
        run: |
          mkdir -p ${{ github.workspace }}/clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20260208-release/Clang-15.0.7-20260208.tar.gz
          tar -xf Clang-15.0.7-20260208.tar.gz -C ${{ github.workspace }}/clang
          rm Clang-15.0.7-20260208.tar.gz
          ${{ github.workspace }}/clang/bin/clang --version

      - name: Setup RKSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" | bash -s main
          mkdir -p drivers/input/touchscreen/mediatek/ft3418_i2c/include/firmware/
          touch drivers/input/touchscreen/mediatek/ft3418_i2c/include/firmware/fw_sample.i

      - name: Apply RKSU Manual Hook Patch
        run: |
          curl -LSs "https://raw.githubusercontent.com/rksuorg/kernel_patches/master/manual_hook/kernel-4.19_5.4.patch" | patch -p1

      - name: Fix Headers, KernelSU Include Path, and Macro Conflicts
        run: |
          python3 - <<'EOF'
          import os, re

          headers = [
              'include/linux/kernel.h',
              'include/linux/limits.h',
              'include/vdso/limits.h',
              'include/uapi/linux/limits.h',
              'include/uapi/linux/xattr.h'
          ]

          macros = [
              'USHRT_MAX','SHRT_MAX','SHRT_MIN','INT_MAX','INT_MIN',
              'UINT_MAX','LONG_MAX','LONG_MIN','ULONG_MAX',
              'LLONG_MAX','LLONG_MIN','ULLONG_MAX',
              'S8_MAX','S8_MIN','U8_MAX','S16_MAX','S16_MIN',
              'U16_MAX','S32_MAX','S32_MIN','U32_MAX',
              'S64_MAX','S64_MIN','U64_MAX',
              'NAME_MAX','PATH_MAX','NGROUPS_MAX','ARG_MAX',
              'XATTR_NAME_MAX','XATTR_SIZE_MAX','XATTR_LIST_MAX'
          ]

          for path in headers:
              if os.path.exists(path):
                  with open(path,'r') as f:
                      lines=f.readlines()
                  new=[]
                  for l in lines:
                      m=None
                      for x in macros:
                          if re.match(r'^[ \t]*#[ \t]*define[ \t]+'+x+r'\b',l):
                              m=x
                              break
                      if m:
                          new.append(f"#ifndef {m}\n")
                          new.append(l)
                          new.append("#endif\n")
                      else:
                          new.append(l)
                  with open(path,'w') as f:
                      f.writelines(new)

          objsec='security/selinux/include/objsec.h'
          if os.path.exists(objsec):
              with open(objsec,'r') as f:
                  c=f.read()
              c=c.replace('#include "flask.h"','#include <flask.h>')
              c=c.replace('#include "av_permissions.h"','#include <av_permissions.h>')
              with open(objsec,'w') as f:
                  f.write(c)

          mk='drivers/kernelsu/Makefile'
          if os.path.exists(mk):
              with open(mk,'r') as f:
                  content=f.read()
              prefix = """ccflags-y += -I$(srctree)/security/selinux/include
          ccflags-y += -I$(srctree)/security/selinux
          ccflags-y += -I$(objtree)/security/selinux
          ccflags-y += -I$(objtree)/security/selinux/include
          """
              with open(mk,'w') as f:
                  f.write(prefix + content)

          app='drivers/kernelsu/app_profile.c'
          if os.path.exists(app):
              with open(app,'r') as f:
                  c=f.read()
              c=re.sub(r'current->seccomp\.mode\s*=\s*0;','',c)
              c=re.sub(r'current->seccomp\.filter\s*=\s*NULL;','',c)
              c=re.sub(r'if\s*\(\!\!\!current->seccomp\.mode\)','if (0)',c)
              with open(app,'w') as f:
                  f.write(c)
          EOF

      - name: Modifikasi Defconfig
        run: |
          DEFCONFIG="arch/arm64/configs/rosemary_defconfig"

          sed -i '/CONFIG_KSU/d' $DEFCONFIG
          sed -i '/CONFIG_KPROBES/d' $DEFCONFIG
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          sed -i '/CONFIG_EROFS_FS/d' $DEFCONFIG
          sed -i '/CONFIG_SDCARD_FS/d' $DEFCONFIG

          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_MANUAL_HOOK=y"
            echo "# CONFIG_KPROBES is not set"
            echo "CONFIG_EROFS_FS=y"
            echo "CONFIG_EROFS_FS_ZIP=y"
            echo "CONFIG_EROFS_FS_POSIX_ACL=y"
            echo "CONFIG_EROFS_FS_SECURITY=y"
            echo "CONFIG_SDCARD_FS=y"
            echo 'CONFIG_LOCALVERSION="-LandVe🪴/Potted-plant"'
            echo "CONFIG_LOCALVERSION_AUTO=n"
          } >> $DEFCONFIG

      - name: Build Kernel
        run: |
          export PATH="${{ github.workspace }}/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="Youffx"
          export KBUILD_BUILD_HOST="Builder"
          export KBUILD_LSB_VERSION=n

          MAKE_FLAGS=(
              ARCH=arm64
              CROSS_COMPILE=aarch64-linux-gnu-
              CROSS_COMPILE_ARM32=arm-linux-gnueabi-
              CC=clang
              LD=ld.lld
              AR=llvm-ar
              NM=llvm-nm
              OBJCOPY=llvm-objcopy
              OBJDUMP=llvm-objdump
              STRIP=llvm-strip
              CLANG_TRIPLE=aarch64-linux-gnu-
              KBUILD_BUILD_VERSION=1
          )

          make O=out "${MAKE_FLAGS[@]}" rosemary_defconfig

          make O=out "${MAKE_FLAGS[@]}" prepare
          make O=out "${MAKE_FLAGS[@]}" scripts

          make -j$(nproc --all) O=out "${MAKE_FLAGS[@]}" 2> build_errors.log

      - name: Upload Error Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Errors-Log
          path: build_errors.log

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: LandVe-Image-RKSU
          path: out/arch/arm64/boot/Image.gz-dtb
