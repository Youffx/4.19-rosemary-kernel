name: Build LandVe Kernel (RKSU)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel by Youffx
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: Youffx/4.19-rosemary-kernel
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf libelf-dev liblz4-tool libncurses5-dev libssl-dev lzop rsync zip zlib1g-dev

      - name: Setup Clang ZyCromerZ
        run: |
          mkdir -p ${{ github.workspace }}/clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20260208-release/Clang-15.0.7-20260208.tar.gz
          tar -xf Clang-15.0.7-20260208.tar.gz -C ${{ github.workspace }}/clang
          rm Clang-15.0.7-20260208.tar.gz
          ${{ github.workspace }}/clang/bin/clang --version

      - name: Add Anxiety I/O Scheduler
        run: |
          sed -i '/config IOSCHED_CFQ/i config IOSCHED_ANXIETY\n\ttristate "Anxiety I/O scheduler"\n\tdefault y\n\thelp\n\t  The Anxiety I/O scheduler prioritizes latency over everything else.\n' block/Kconfig.iosched
          sed -i '/config DEFAULT_NOOP/i \tconfig DEFAULT_ANXIETY\n\t\tbool "Anxiety" if IOSCHED_ANXIETY=y\n' block/Kconfig.iosched
          sed -i 's/default "noop" if DEFAULT_NOOP/default "anxiety" if DEFAULT_ANXIETY\n\tdefault "noop" if DEFAULT_NOOP/' block/Kconfig.iosched
          sed -i '/obj-$(CONFIG_IOSCHED_TEST)/a obj-$(CONFIG_IOSCHED_ANXIETY)\t+= anxiety-iosched.o' block/Makefile
          cat << 'EOF' > block/anxiety-iosched.c
          #include <linux/blkdev.h>
          #include <linux/elevator.h>
          #include <linux/bio.h>
          #include <linux/module.h>
          #include <linux/slab.h>
          #include <linux/init.h>
          #include <linux/fb.h>

          #define DEFAULT_MAX_WRITES_STARVED 4
          #define DEFAULT_MAX_WRITES_STARVED_SUSPENDED 2

          struct anxiety_data {
          	struct list_head queue[2];
          	uint16_t writes_starved;
          	struct notifier_block fb_notifier;
          	bool display_on;

          	uint8_t max_writes_starved;
          	uint8_t max_writes_starved_suspended;
          };

          static void anxiety_merged_requests(struct request_queue *q, struct request *rq, struct request *next)
          {
          	rq_fifo_clear(next);
          }

          static __always_inline struct request *anxiety_choose_request(struct anxiety_data *adata)
          {
          	bool starved;
          	
          	starved = adata->writes_starved > (adata->display_on ? adata->max_writes_starved : adata->max_writes_starved_suspended);

          	if (!starved && !list_empty(&adata->queue[READ])) {
          		adata->writes_starved++;
          		return rq_entry_fifo(adata->queue[READ].next);
          	}

          	if (!list_empty(&adata->queue[WRITE])) {
          		adata->writes_starved = 0;
          		return rq_entry_fifo(adata->queue[WRITE].next);
          	}

          	adata->writes_starved = 0;
          	return NULL;
          }

          static int anxiety_dispatch(struct request_queue *q, int force)
          {
          	struct anxiety_data *adata = q->elevator->elevator_data;
          	struct request *rq = anxiety_choose_request(adata);

          	if (!rq)
          		return 0;

          	rq_fifo_clear(rq);
          	elv_dispatch_add_tail(rq->q, rq);

          	return 1;
          }

          static void anxiety_add_request(struct request_queue *q, struct request *rq)
          {
          	struct anxiety_data *adata = q->elevator->elevator_data;
          	const uint8_t dir = rq_data_dir(rq);

          	list_add_tail(&rq->queuelist, &adata->queue[dir]);
          }

          static struct request *anxiety_former_request(struct request_queue *q, struct request *rq)
          {
          	struct anxiety_data *adata = q->elevator->elevator_data;
          	const uint8_t dir = rq_data_dir(rq);

          	if (rq->queuelist.prev == &adata->queue[dir])
          		return NULL;

          	return list_prev_entry(rq, queuelist);
          }

          static struct request *anxiety_latter_request(struct request_queue *q, struct request *rq)
          {
          	struct anxiety_data *adata = q->elevator->elevator_data;
          	const uint8_t dir = rq_data_dir(rq);

          	if (rq->queuelist.next == &adata->queue[dir])
          		return NULL;

          	return list_next_entry(rq, queuelist);
          }

          static int fb_notifier_callback(struct notifier_block *self,
          				unsigned long event, void *data)
          {
          	struct anxiety_data *adata = container_of(self, struct anxiety_data, fb_notifier);
          	struct fb_event *evdata = data;
          	int *blank;

          	if (evdata && evdata->data && event == FB_EVENT_BLANK) {
          		blank = evdata->data;
          		switch (*blank) {
          		case FB_BLANK_UNBLANK:
          			adata->display_on = true;
          			break;
          		case FB_BLANK_POWERDOWN:
          		case FB_BLANK_HSYNC_SUSPEND:
          		case FB_BLANK_VSYNC_SUSPEND:
          		case FB_BLANK_NORMAL:
          			adata->display_on = false;
          			break;
          		}
          	}

          	return 0;
          }

          static int anxiety_init_queue(struct request_queue *q, struct elevator_type *elv)
          {
          	struct anxiety_data *adata;
          	struct elevator_queue *eq;

          	eq = elevator_alloc(q, elv);
          	if (!eq)
          		return -ENOMEM;

          	adata = kmalloc_node(sizeof(*adata), GFP_KERNEL, q->node);
          	if (!adata) {
          		kobject_put(&eq->kobj);
          		return -ENOMEM;
          	}

          	eq->elevator_data = adata;

          	INIT_LIST_HEAD(&adata->queue[READ]);
          	INIT_LIST_HEAD(&adata->queue[WRITE]);
          	adata->writes_starved = 0;
          	adata->max_writes_starved = DEFAULT_MAX_WRITES_STARVED;
          	adata->max_writes_starved_suspended = DEFAULT_MAX_WRITES_STARVED_SUSPENDED;
          	adata->display_on = true;

          	adata->fb_notifier.notifier_call = fb_notifier_callback;
          	fb_register_client(&adata->fb_notifier);

          	spin_lock_irq(q->queue_lock);
          	q->elevator = eq;
          	spin_unlock_irq(q->queue_lock);

          	return 0;
          }

          static void anxiety_exit_queue(struct elevator_queue *e)
          {
          	struct anxiety_data *adata = e->elevator_data;

          	fb_unregister_client(&adata->fb_notifier);
          	kfree(adata);
          }

          static ssize_t anxiety_var_show(int var, char *page)
          {
          	return snprintf(page, PAGE_SIZE, "%d\n", var);
          }

          static ssize_t anxiety_var_store(int *var, const char *page, size_t count)
          {
          	int err = kstrtoint(page, 10, var);
          	return err ? err : count;
          }

          #define SHOW_FUNCTION(__FUNC, __VAR) \
          static ssize_t __FUNC(struct elevator_queue *e, char *page) \
          { \
          	struct anxiety_data *adata = e->elevator_data; \
          	return anxiety_var_show(__VAR, page); \
          }
          SHOW_FUNCTION(anxiety_max_writes_starved_show, adata->max_writes_starved);
          SHOW_FUNCTION(anxiety_max_writes_starved_suspended_show, adata->max_writes_starved_suspended);
          #undef SHOW_FUNCTION

          #define STORE_FUNCTION(__FUNC, __PTR) \
          static ssize_t __FUNC(struct elevator_queue *e, const char *page, size_t count) \
          { \
          	struct anxiety_data *adata = e->elevator_data; \
          	return anxiety_var_store(__PTR, page, count); \
          }
          STORE_FUNCTION(anxiety_max_writes_starved_store, (int *)&adata->max_writes_starved);
          STORE_FUNCTION(anxiety_max_writes_starved_suspended_store, (int *)&adata->max_writes_starved_suspended);
          #undef STORE_FUNCTION

          static struct elv_fs_entry anxiety_attrs[] = {
          	__ATTR(max_writes_starved, 0644, anxiety_max_writes_starved_show, anxiety_max_writes_starved_store),
          	__ATTR(max_writes_starved_suspended, 0644, anxiety_max_writes_starved_suspended_show, anxiety_max_writes_starved_suspended_store),
          	__ATTR_NULL
          };

          static struct elevator_type elevator_anxiety = {
          	.ops = {
          		.elevator_merge_req_fn	= anxiety_merged_requests,
          		.elevator_dispatch_fn	= anxiety_dispatch,
          		.elevator_add_req_fn	= anxiety_add_request,
          		.elevator_former_req_fn	= anxiety_former_request,
          		.elevator_latter_req_fn	= anxiety_latter_request,
          		.elevator_init_fn	= anxiety_init_queue,
          		.elevator_exit_fn	= anxiety_exit_queue,
          	},
          	.elevator_name = "anxiety",
          	.elevator_attrs = anxiety_attrs,
          	.elevator_owner = THIS_MODULE,
          };

          static int __init anxiety_init(void)
          {
          	return elv_register(&elevator_anxiety);
          }

          static void __exit anxiety_exit(void)
          {
          	elv_unregister(&elevator_anxiety);
          }

          module_init(anxiety_init);
          module_exit(anxiety_exit);

          MODULE_AUTHOR("Tyler Nijmeh");
          MODULE_LICENSE("GPL");
          MODULE_DESCRIPTION("Anxiety IO scheduler");
          EOF

      - name: Setup RKSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" | bash -s main
          mkdir -p drivers/input/touchscreen/mediatek/ft3418_i2c/include/firmware/
          touch drivers/input/touchscreen/mediatek/ft3418_i2c/include/firmware/fw_sample.i

      - name: Apply RKSU Manual Hook Patch
        run: |
          curl -LSs "https://raw.githubusercontent.com/rksuorg/kernel_patches/master/manual_hook/kernel-4.19_5.4.patch" | patch -p1

      - name: Modifikasi Defconfig
        run: |
          DEFCONFIG="arch/arm64/configs/rosemary_defconfig"

          sed -i '/CONFIG_KSU/d' $DEFCONFIG
          sed -i '/CONFIG_KPROBES/d' $DEFCONFIG
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          sed -i '/CONFIG_EROFS_FS/d' $DEFCONFIG
          sed -i '/CONFIG_SDCARD_FS/d' $DEFCONFIG
          sed -i '/CONFIG_LZ4_COMPRESS/d' $DEFCONFIG
          sed -i '/CONFIG_LZ4HC_COMPRESS/d' $DEFCONFIG
          sed -i '/CONFIG_IOSCHED_ANXIETY/d' $DEFCONFIG
          sed -i '/CONFIG_DEFAULT_ANXIETY/d' $DEFCONFIG
          sed -i '/CONFIG_DEFAULT_IOSCHED/d' $DEFCONFIG
          sed -i '/CONFIG_DYNAMIC_DEBUG/d' $DEFCONFIG
          sed -i '/CONFIG_DEBUG_INFO/d' $DEFCONFIG
          sed -i '/CONFIG_SCHEDSTATS/d' $DEFCONFIG
          sed -i '/CONFIG_ENABLE_DEFAULT_TRACERS/d' $DEFCONFIG
          sed -i '/CONFIG_SND_DEBUG/d' $DEFCONFIG
          sed -i '/CONFIG_SND_DEBUG_VERBOSE/d' $DEFCONFIG
          sed -i '/CONFIG_SND_PCM_XRUN_DEBUG/d' $DEFCONFIG
          sed -i '/CONFIG_MTK_SCHED_TRACERS/d' $DEFCONFIG

          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_MANUAL_HOOK=y"
            echo "CONFIG_KPROBES=n"
            echo "CONFIG_EROFS_FS=y"
            echo "CONFIG_EROFS_FS_ZIP=y"
            echo "CONFIG_EROFS_FS_POSIX_ACL=y"
            echo "CONFIG_EROFS_FS_SECURITY=y"
            echo "CONFIG_SDCARD_FS=y"
            echo 'CONFIG_LOCALVERSION="-LandVe🍋‍🟩/Lime"'
            echo "CONFIG_LOCALVERSION_AUTO=n"
            echo "CONFIG_LZ4_COMPRESS=y"
            echo "CONFIG_LZ4HC_COMPRESS=y"
            echo "CONFIG_IOSCHED_ANXIETY=y"
            echo "CONFIG_DEFAULT_ANXIETY=y"
            echo 'CONFIG_DEFAULT_IOSCHED="anxiety"'
            echo "CONFIG_DYNAMIC_DEBUG=n"
            echo "CONFIG_DEBUG_INFO=n"
            echo "CONFIG_SCHEDSTATS=n"
            echo "CONFIG_ENABLE_DEFAULT_TRACERS=n"
            echo "CONFIG_SND_DEBUG=n"
            echo "CONFIG_SND_DEBUG_VERBOSE=n"
            echo "CONFIG_SND_PCM_XRUN_DEBUG=n"
            echo "CONFIG_MTK_SCHED_TRACERS=n"
          } >> $DEFCONFIG

      - name: Build Kernel
        run: |
          export PATH="${{ github.workspace }}/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="Youffx"
          export KBUILD_BUILD_HOST="Builder"
          export KBUILD_LSB_VERSION=n
          MAKE_FLAGS=(
              ARCH=arm64
              CROSS_COMPILE=aarch64-linux-gnu-
              CROSS_COMPILE_ARM32=arm-linux-gnueabi-
              CC=clang
              LD=ld.lld
              AR=llvm-ar
              NM=llvm-nm
              OBJCOPY=llvm-objcopy
              OBJDUMP=llvm-objdump
              STRIP=llvm-strip
              CLANG_TRIPLE=aarch64-linux-gnu-
              KBUILD_BUILD_VERSION=1
          )
          
          make O=out "${MAKE_FLAGS[@]}" rosemary_defconfig
          make -j$(nproc --all) O=out "${MAKE_FLAGS[@]}"

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: LandVe-Image-RKSU
          path: out/arch/arm64/boot/Image.gz-dtb
          
